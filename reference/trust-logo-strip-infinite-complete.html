<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite logo strip (rAF + wrap) — complete reference</title>
  <style>
    :root {
      --background: #f4f6fb;
    }

    body {
      margin: 0;
      background: var(--background);
      font-family: system-ui, sans-serif;
    }

    .trust-section {
      overflow: hidden;
      background: var(--background);
      padding: 3rem 0;
    }

    .logo-marquee {
      position: relative;
      overflow: hidden;
      margin: 2rem 0;
    }

    .logo-marquee::before,
    .logo-marquee::after {
      content: "";
      position: absolute;
      top: 0;
      width: 140px;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    .logo-marquee::before {
      left: 0;
      background: linear-gradient(to right, var(--background), transparent);
    }

    .logo-marquee::after {
      right: 0;
      background: linear-gradient(to left, var(--background), transparent);
    }

    /* Two inner groups, same content; outer row gap: 0 */
    .logo-track {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0;
      width: max-content;
      will-change: transform;
    }

    .logo-track-group {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 54px;
      flex: 0 0 auto;
    }

    .logo-pill {
      width: 180px;
      height: 70px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .logo-pill img {
      max-width: 120px;
      max-height: 42px;
      object-fit: contain;
      filter: grayscale(100%);
      opacity: 0.38;
      transition: opacity 0.25s ease, transform 0.25s ease, filter 0.25s ease;
    }

    .logo-pill:hover img {
      opacity: 1;
      filter: none;
      transform: scale(1.05);
    }

    @media (max-width: 640px) {
      .logo-pill { width: 140px; height: 60px; }
      .logo-track-group { gap: 38px; }
      .logo-marquee::before,
      .logo-marquee::after { width: 72px; }
    }
  </style>
</head>
<body>

<section class="trust-section">
  <div class="logo-marquee" aria-label="Partner logos">
    <div class="logo-track" id="track">
      <div class="logo-track-group" id="groupA">
        <div class="logo-pill"><img src="https://upload.wikimedia.org/wikipedia/commons/c/ca/Sony_logo.svg" alt="Sony"></div>
        <div class="logo-pill"><img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" alt="Spotify"></div>
        <div class="logo-pill"><img src="https://upload.wikimedia.org/wikipedia/commons/4/44/BMW.svg" alt="BMW"></div>
        <div class="logo-pill"><img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google"></div>
        <div class="logo-pill"><img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon"></div>
        <div class="logo-pill"><img src="https://upload.wikimedia.org/wikipedia/commons/6/69/Airbnb_Logo_B%C3%A9lo.svg" alt="Airbnb"></div>
      </div>
      <div class="logo-track-group" id="groupB" aria-hidden="true">
        <div class="logo-pill"><img src="https://upload.wikimedia.org/wikipedia/commons/c/ca/Sony_logo.svg" alt=""></div>
        <div class="logo-pill"><img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" alt=""></div>
        <div class="logo-pill"><img src="https://upload.wikimedia.org/wikipedia/commons/4/44/BMW.svg" alt=""></div>
        <div class="logo-pill"><img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt=""></div>
        <div class="logo-pill"><img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt=""></div>
        <div class="logo-pill"><img src="https://upload.wikimedia.org/wikipedia/commons/6/69/Airbnb_Logo_B%C3%A9lo.svg" alt=""></div>
      </div>
    </div>
  </div>
</section>

<script>
(function () {
  const track = document.getElementById("track");
  const group = document.getElementById("groupA");
  if (!track || !group) return;

  if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

  const SPEED_PX_S = 70;
  let offset = 0;
  let last = performance.now();
  let raf = 0;

  function tick(now) {
    const w = group.getBoundingClientRect().width;
    if (w < 1) {
      raf = requestAnimationFrame(tick);
      return;
    }

    const dt = Math.min(0.064, (now - last) / 1000);
    last = now;

    offset -= SPEED_PX_S * dt;
    while (offset <= -w) offset += w;

    track.style.transform = "translate3d(" + offset + "px,0,0)";
    raf = requestAnimationFrame(tick);
  }

  const ro = new ResizeObserver(function () {
    const w = group.getBoundingClientRect().width;
    if (w <= 0) return;
    while (offset <= -w) offset += w;
  });
  ro.observe(group);

  raf = requestAnimationFrame(tick);
})();
</script>

</body>
</html>
